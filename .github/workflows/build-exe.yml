name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract OCR
        run: choco install tesseract -y

      - name: Install UPX (for compression)
        run: choco install upx -y

      - name: Prepare bundled Tesseract (only eng language)
        shell: pwsh
        run: |
          $tess = "C:\Program Files\Tesseract-OCR"
          $bundle = "tesseract_bundle\tesseract"
          New-Item -ItemType Directory -Path "$bundle\tessdata" -Force
          Copy-Item "$tess\tesseract.exe" "$bundle\"
          Get-ChildItem "$tess\*.dll" | Copy-Item -Destination "$bundle\"
          Copy-Item "$tess\tessdata\eng.traineddata" "$bundle\tessdata\"
          Copy-Item "$tess\tessdata\osd.traineddata" "$bundle\tessdata\" -ErrorAction SilentlyContinue
          $size = (Get-ChildItem "$bundle" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Output "Tesseract bundle size: $([math]::Round($size, 1)) MB"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with UPX compression
        shell: pwsh
        run: |
          $upxDir = (Get-Command upx -ErrorAction SilentlyContinue).Source | Split-Path
          if (-not $upxDir) { $upxDir = "C:\ProgramData\chocolatey\bin" }
          pyinstaller --onefile --windowed --clean --name UNGREED-PDF --upx-dir $upxDir --upx-exclude "python312.dll" --upx-exclude "pydll" --upx-exclude "vcruntime140.dll" --upx-exclude "vcruntime140_1.dll" --upx-exclude "ucrtbase.dll" --version-file version_info.py --add-data "converter.py;." --add-data "tesseract_bundle/tesseract;tesseract" app.py

      - name: Check EXE size
        shell: pwsh
        run: |
          $size = (Get-Item "dist\UNGREED-PDF.exe").Length / 1MB
          Write-Output "EXE size: $([math]::Round($size, 1)) MB"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNGREED-PDF-Windows
          path: dist/UNGREED-PDF.exe

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: UNGREED-PDF-Windows

      - name: Delete old release
        run: gh release delete v1.0.0 --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: UNGREED-PDF v1.0.0
          body: |
            ## UNGREED-PDF v1.0.0

            Convert any PDF (text-based or scanned/image) into an editable Word document.

            ### Download
            - **UNGREED-PDF.exe** — Standalone Windows application

            ### Usage
            Just download, double-click, and convert. No other software needed.
            Works out of the box on Windows 10/11.
          files: UNGREED-PDF.exe
          make_latest: true
